name: Android Release (AAB)

# Builds the web app, wraps it with Capacitor, and produces a signed Android
# App Bundle (.aab) ready for Google Play.
#
#   • Push a tag like `v3.0.1`  -> versionName = 3.0.1, signed AAB uploaded as an artifact.
#   • Manual run (workflow_dispatch) -> versionName from package.json, optional override input.
#
# versionCode is the workflow run number, so every build is strictly increasing
# (Play rejects duplicate or decreasing codes).
#
# Signing secrets (Repo Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of your upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD  store password
#   ANDROID_KEY_ALIAS          key alias
#   ANDROID_KEY_PASSWORD       key password
# If the keystore secret is absent the build still runs and is debug-signed
# (installable for testing, NOT uploadable to Play).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      versionName:
        description: "Override versionName (e.g. 3.0.1). Blank = use package.json."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-aab:
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor (copy web assets into the native project)
        run: npx cap sync android

      - name: Resolve versionName
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            NAME="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.versionName }}" ]]; then
            NAME="${{ github.event.inputs.versionName }}"
          else
            NAME="$(node -p "require('./package.json').version")"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=${NAME}, versionCode=${{ github.run_number }}"

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/android/keystore.jks"
          echo "ANDROID_KEYSTORE_FILE=$GITHUB_WORKSPACE/android/keystore.jks" >> "$GITHUB_ENV"

      - name: Build signed AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName=${{ steps.ver.outputs.name }} \
            --no-daemon --stacktrace

      - name: Warn if unsigned
        if: ${{ env.ANDROID_KEYSTORE_BASE64 == '' }}
        run: echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — the AAB is debug-signed and CANNOT be uploaded to Google Play. Add the signing secrets to produce a release build."

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tequila-tao-${{ steps.ver.outputs.name }}-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30
