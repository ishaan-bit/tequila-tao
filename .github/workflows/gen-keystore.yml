name: Generate Upload Keystore (one-time setup)

# Run this ONCE to create the Android upload keystore.
# It outputs a keystore.b64 artifact — the automation downloads that and sets
# the 4 signing secrets, then triggers a signed release build.
# After the release build goes green, disable or delete this workflow.
#
# Trigger: Actions tab → "Generate Upload Keystore" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: "Keystore password (min 6 chars — save this in your password manager)"
        required: true
      key_alias:
        description: "Key alias"
        required: true
        default: "upload"
      key_password:
        description: "Key password (min 6 chars)"
        required: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=Tequila Tao, O=Tequila Tao, C=US"
          base64 -w0 upload-keystore.jks > keystore.b64
          echo "✅ Keystore generated"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: keystore.b64
          # Short retention — once secrets are set this artifact is no longer needed.
          retention-days: 1
